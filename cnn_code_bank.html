<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNN Classifier — Code Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #151820;
      --card:     #1c2030;
      --border:   #2a2f42;
      --accent:   #7c6af7;
      --accent2:  #5dd6b5;
      --danger:   #f25c7a;
      --text:     #e4e7f0;
      --muted:    #6b7294;
      --code-bg:  #101420;
      --drop-bg:  #1a2540;
      --drop-ok:  #1a3a2b;
      --drop-err: #38151f;
      --radius:   10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }
    header h1 {
      font-size: 1.9rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    header p { color: var(--muted); margin-top: .4rem; font-size: .9rem; }

    /* ── Controls ── */
    .controls {
      display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    button {
      font-family: inherit; font-size: .85rem; font-weight: 600;
      padding: .5rem 1.25rem; border: none; border-radius: var(--radius);
      cursor: pointer; transition: transform .1s, opacity .15s;
    }
    button:active { transform: scale(.96); }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: var(--danger); color: #fff; }

    /* ── Score bar ── */
    .score-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 1.25rem; margin-bottom: 1.75rem; flex-wrap: wrap;
    }
    .score-pill {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 99px; padding: .3rem .9rem; font-size: .82rem;
      display: flex; align-items: center; gap: .45rem;
    }
    .score-pill span:first-child { color: var(--muted); }
    .score-pill .val { font-weight: 700; color: var(--accent2); font-size: .95rem; }

    /* ── Layout ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 880px) { .workspace { grid-template-columns: 1fr; } }

    /* ── Section cards ── */
    .section-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
    }
    .section-title {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--accent); margin-bottom: 1rem;
    }
    .slot-wrap { margin-bottom: 1rem; }

    .prompt-label {
      font-family: 'JetBrains Mono', monospace; font-size: .76rem;
      color: var(--muted); margin-bottom: .2rem; display: block;
    }
    .hint-text {
      font-size: .72rem; color: var(--muted); font-style: italic; margin-bottom: .4rem;
    }

    /* ── Drop zones ── */
    .drop-zone {
      min-height: 46px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: .4rem .5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .35rem;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .drop-zone::before {
      content: "Drop here…";
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      color: var(--border);
      position: absolute;
      left: .75rem;
      pointer-events: none;
      transition: opacity .1s;
    }
    .drop-zone.has-token::before { opacity: 0; }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--drop-bg);
    }
    .drop-zone.correct {
      border-color: var(--accent2);
      background: var(--drop-ok);
    }
    .drop-zone.wrong {
      border-color: var(--danger);
      background: var(--drop-err);
      animation: shake .3s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0) }
      20%     { transform: translateX(-5px) }
      60%     { transform: translateX(5px) }
    }

    /* ── Placed token chips ── */
    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      background: #1e2840;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: .3rem .6rem;
      cursor: grab;
      user-select: none;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      transition: box-shadow .15s, transform .1s;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .chip:hover { box-shadow: 0 0 0 2px rgba(124,106,247,.3); }
    .chip.dragging { opacity: .4; transform: scale(.95); }
    .chip-remove {
      font-size: .7rem; color: var(--muted); cursor: pointer;
      padding: 0 .15rem; border-radius: 3px;
      transition: color .1s;
    }
    .chip-remove:hover { color: var(--danger); }

    /* ── Scrollable bank panel ── */
    .bank-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: sticky;
      top: 1rem;
      max-height: calc(100vh - 2rem);
      display: flex;
      flex-direction: column;
    }
    .bank-panel-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: .85rem; flex-shrink: 0;
    }
    .bank-panel-header h2 {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--accent2);
    }
    .bank-count {
      font-size: .72rem; color: var(--muted); background: var(--card);
      border: 1px solid var(--border); border-radius: 99px; padding: .15rem .6rem;
    }
    .bank-search {
      width: 100%; font-family: 'JetBrains Mono', monospace; font-size: .78rem;
      background: var(--code-bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: .4rem .65rem; outline: none; margin-bottom: .75rem; flex-shrink: 0;
      transition: border-color .15s;
    }
    .bank-search:focus { border-color: var(--accent); }

    .bank-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .4rem;
      padding-right: .2rem;
    }
    .bank-list::-webkit-scrollbar { width: 5px; }
    .bank-list::-webkit-scrollbar-track { background: transparent; }
    .bank-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Bank tokens ── */
    .bank-token {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: .4rem .7rem;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      cursor: grab;
      user-select: none;
      transition: border-color .15s, opacity .2s, transform .1s;
      position: relative;
    }
    .bank-token:hover:not(.used) {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124,106,247,.2);
    }
    .bank-token.dragging { opacity: .35; transform: scale(.96); }
    .bank-token.used {
      opacity: .28;
      cursor: not-allowed;
      pointer-events: none;
      text-decoration: line-through;
      color: var(--muted);
    }
    .bank-token.used::after {
      content: "✓ in use";
      position: absolute;
      right: .5rem; top: 50%; transform: translateY(-50%);
      font-size: .63rem; color: var(--accent2); font-style: normal;
      text-decoration: none;
    }
    .bank-token.hidden { display: none; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 99px; padding: .55rem 1.5rem;
      font-size: .88rem; font-weight: 600;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.toast-ok  { border-color: var(--accent2); color: var(--accent2); }
    #toast.toast-err { border-color: var(--danger);  color: var(--danger); }

    /* ── Overlay ── */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.72); backdrop-filter: blur(6px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    #overlay.active { display: flex; }
    .overlay-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 3rem 3.5rem; text-align: center; max-width: 460px;
    }
    .overlay-box h2 {
      font-size: 1.7rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 1rem;
    }
    .overlay-box p { color: var(--muted); margin-bottom: 1.25rem; }
    .big-score { font-size: 2.8rem; font-weight: 700; color: var(--accent2); }
  </style>
</head>
<body>

<header>
  <h1>🧠 CNN Classifier — Code Bank</h1>
  <p>Drag tokens from the scrollable bank on the right into the correct drop zone. Tokens mark <strong>in use</strong> when placed.</p>
</header>

<div class="controls">
  <button class="btn-primary"   id="checkBtn">✔ Check Answers</button>
  <button class="btn-secondary" id="shuffleBtn">🔀 Re-shuffle Bank</button>
  <button class="btn-danger"    id="resetBtn">↺ Reset All</button>
</div>

<div class="score-bar">
  <div class="score-pill"><span>Correct</span><span class="val" id="scoreCorrect">0</span></div>
  <div class="score-pill"><span>Total Slots</span><span class="val" id="scoreTotal">0</span></div>
  <div class="score-pill"><span>Placed</span><span class="val" id="scorePlaced">0</span></div>
  <div class="score-pill"><span>Accuracy</span><span class="val" id="scorePct">—</span></div>
</div>

<div class="workspace">
  <div id="sections"></div>

  <aside class="bank-panel">
    <div class="bank-panel-header">
      <h2>📦 Code Bank</h2>
      <span class="bank-count" id="bankCount">0 remaining</span>
    </div>
    <input class="bank-search" id="bankSearch" placeholder="Filter tokens…" autocomplete="off" spellcheck="false" />
    <div class="bank-list" id="bankList"></div>
  </aside>
</div>

<div id="toast"></div>
<div id="overlay">
  <div class="overlay-box">
    <h2>🎉 Complete!</h2>
    <p>All slots filled! Final score:</p>
    <div class="big-score" id="overlayScore">—</div>
    <p style="margin-top:.4rem">correct answers</p>
    <br/>
    <button class="btn-secondary" onclick="document.getElementById('overlay').classList.remove('active')">Close</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────
const SECTIONS = [
  {
    title: "1. Imports",
    slots: [
      { id:"s1_torch",  label:"Core library import",         hint:"The main PyTorch package",                      answer:"import torch" },
      { id:"s1_nn",     label:"Neural network module",       hint:"Aliased as nn",                                 answer:"import torch.nn as nn" },
      { id:"s1_F",      label:"Functional API",              hint:"Aliased as F",                                  answer:"import torch.nn.functional as F" },
      { id:"s1_optim",  label:"Optimizers module",           hint:"Aliased as optim",                              answer:"import torch.optim as optim" },
      { id:"s1_loader", label:"DataLoader import",           hint:"From torch.utils.data",                         answer:"from torch.utils.data import DataLoader" },
      { id:"s1_vision", label:"Dataset & transforms import", hint:"From torchvision",                              answer:"from torchvision import datasets, transforms" },
    ]
  },
  {
    title: "2. Hyperparameters",
    slots: [
      { id:"s2_bs",  label:"batch_size",    hint:"Common mini-batch size (power of 2)",           answer:"batch_size = 64" },
      { id:"s2_ep",  label:"num_epochs",    hint:"How many full passes through the training set",  answer:"num_epochs = 5" },
      { id:"s2_lr",  label:"learning_rate", hint:"Adam default; scientific notation",              answer:"learning_rate = 1e-3" },
      { id:"s2_dev", label:"device",        hint:"Use GPU if available, else CPU",                 answer:'device = torch.device("cuda" if torch.cuda.is_available() else "cpu")' },
    ]
  },
  {
    title: "3. Data Loading",
    slots: [
      { id:"s3_tr",  label:"Transform pipeline",    hint:"ToTensor + Normalize with MNIST mean/std", answer:'transform = transforms.Compose([transforms.ToTensor(), transforms.Normalize((0.1307,), (0.3081,))])' },
      { id:"s3_trn", label:"Training dataset",      hint:"train=True, download=True",                answer:'train_dataset = datasets.MNIST("./MNIST", train=True, download=True, transform=transform)' },
      { id:"s3_tst", label:"Test dataset",          hint:"train=False",                              answer:'test_dataset = datasets.MNIST("./MNIST", train=False, download=True, transform=transform)' },
      { id:"s3_trl", label:"Training DataLoader",   hint:"shuffle=True, use batch_size",             answer:'train_loader = DataLoader(train_dataset, batch_size=batch_size, shuffle=True)' },
      { id:"s3_tel", label:"Test DataLoader",       hint:"shuffle=False",                            answer:'test_loader = DataLoader(test_dataset, batch_size=batch_size, shuffle=False)' },
    ]
  },
  {
    title: "4. Model — __init__ layers",
    slots: [
      { id:"s4_c1", label:"conv1", hint:"1 input channel → 32 filters, 3×3 kernel, padding=1", answer:"self.conv1 = nn.Conv2d(1, 32, kernel_size=3, padding=1)" },
      { id:"s4_c2", label:"conv2", hint:"32 → 64 filters, same kernel size & padding",          answer:"self.conv2 = nn.Conv2d(32, 64, kernel_size=3, padding=1)" },
      { id:"s4_mp", label:"pool",  hint:"MaxPool2d with 2×2 window and stride 2",               answer:"self.pool = nn.MaxPool2d(2, 2)" },
      { id:"s4_f1", label:"fc1",   hint:"Flatten size after two pools: 64 × 7 × 7",             answer:"self.fc1 = nn.Linear(64 * 7 * 7, 128)" },
      { id:"s4_f2", label:"fc2",   hint:"10 output classes (digits 0–9)",                       answer:"self.fc2 = nn.Linear(128, 10)" },
    ]
  },
  {
    title: "4. Model — forward pass",
    slots: [
      { id:"s4_fp1", label:"conv1 → ReLU → pool", hint:"First conv block, 28×28 → 14×14",          answer:"x = self.pool(F.relu(self.conv1(x)))" },
      { id:"s4_fp2", label:"conv2 → ReLU → pool", hint:"Second conv block, 14×14 → 7×7",           answer:"x = self.pool(F.relu(self.conv2(x)))" },
      { id:"s4_fp3", label:"flatten",              hint:"Collapse spatial dims for FC layers",       answer:"x = x.view(-1, 64 * 7 * 7)" },
      { id:"s4_fp4", label:"fc1 → ReLU",           hint:"First fully-connected layer + activation", answer:"x = F.relu(self.fc1(x))" },
      { id:"s4_fp5", label:"fc2 (logits)",         hint:"No softmax — CrossEntropyLoss handles it",  answer:"return self.fc2(x)" },
    ]
  },
  {
    title: "5. Instantiate Model, Loss & Optimizer",
    slots: [
      { id:"s5_mdl",  label:"model",     hint:"Move model to the chosen device",              answer:"model = CNN().to(device)" },
      { id:"s5_crit", label:"criterion", hint:"Standard multi-class classification loss",      answer:"criterion = nn.CrossEntropyLoss()" },
      { id:"s5_opt",  label:"optimizer", hint:"Adaptive optimizer with our learning_rate",     answer:"optimizer = optim.Adam(model.parameters(), lr=learning_rate)" },
    ]
  },
  {
    title: "6. Training Loop",
    slots: [
      { id:"s6_mv",   label:"Move batch to device", hint:"Applies to both images and labels",  answer:"images, labels = images.to(device), labels.to(device)" },
      { id:"s6_zg",   label:"Zero the gradients",   hint:"Must do this each mini-batch",       answer:"optimizer.zero_grad()" },
      { id:"s6_fwd",  label:"Forward pass",         hint:"Get predictions from the model",     answer:"outputs = model(images)" },
      { id:"s6_loss", label:"Compute loss",         hint:"Pass logits and ground-truth labels", answer:"loss = criterion(outputs, labels)" },
      { id:"s6_bwd",  label:"Backprop",             hint:"Compute gradients",                  answer:"loss.backward()" },
      { id:"s6_step", label:"Optimizer step",       hint:"Update weights",                     answer:"optimizer.step()" },
    ]
  },
  {
    title: "7. Evaluation",
    slots: [
      { id:"s7_ev",   label:"Switch to eval mode",       hint:"Disables dropout / batchnorm training behavior", answer:"model.eval()" },
      { id:"s7_ng",   label:"Disable gradient tracking", hint:"Context manager for inference",               answer:"with torch.no_grad():" },
      { id:"s7_pred", label:"Predictions",               hint:"Class with highest logit score",              answer:"predictions = outputs.argmax(dim=1)" },
      { id:"s7_acc",  label:"Accumulate correct",        hint:"Compare predictions to ground truth",         answer:"correct += (predictions == labels).sum().item()" },
      { id:"s7_prt",  label:"Print accuracy",            hint:"correct / total * 100",                       answer:'print(f"Test Accuracy: {100 * correct / total:.2f}%")' },
    ]
  },
  {
    title: "8. Save Model",
    slots: [
      { id:"s8_sv", label:"Save state dict", hint:"Standard PyTorch checkpoint pattern", answer:'torch.save(model.state_dict(), "cnn_mnist.pt")' },
    ]
  },
];

const ALL_SLOTS = SECTIONS.flatMap(s => s.slots);

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let placements = {};   // slotId → answer string
let dragPayload = null; // { answer, fromSlot: slotId|null }
let _bankOrder  = null;

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function usedAnswers() {
  return new Set(Object.values(placements));
}

// ─────────────────────────────────────────
//  RENDER SECTIONS + DROP ZONES
// ─────────────────────────────────────────
function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  SECTIONS.forEach(sec => {
    const card = document.createElement("div");
    card.className = "section-card";
    card.innerHTML = `<div class="section-title">${sec.title}</div>`;

    sec.slots.forEach(slot => {
      const wrap = document.createElement("div");
      wrap.className = "slot-wrap";

      const lbl = document.createElement("span");
      lbl.className = "prompt-label";
      lbl.textContent = `▸ ${slot.label}`;

      const hint = document.createElement("div");
      hint.className = "hint-text";
      hint.textContent = `Hint: ${slot.hint}`;

      const zone = document.createElement("div");
      zone.className = "drop-zone";
      zone.dataset.slotId = slot.id;

      if (placements[slot.id]) {
        zone.classList.add("has-token");
        zone.appendChild(makeChip(placements[slot.id], slot.id));
      }

      // Drag events on the zone
      zone.addEventListener("dragover", e => {
        e.preventDefault();
        zone.classList.add("drag-over");
      });
      zone.addEventListener("dragleave", e => {
        if (!zone.contains(e.relatedTarget)) zone.classList.remove("drag-over");
      });
      zone.addEventListener("drop", e => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        if (!dragPayload) return;

        // If dragging from another slot, free it
        if (dragPayload.fromSlot && dragPayload.fromSlot !== slot.id) {
          delete placements[dragPayload.fromSlot];
        }

        placements[slot.id] = dragPayload.answer;
        dragPayload = null;
        clearFeedback();
        rerender();
      });

      wrap.appendChild(lbl);
      wrap.appendChild(hint);
      wrap.appendChild(zone);
      card.appendChild(wrap);
    });

    container.appendChild(card);
  });

  document.getElementById("scoreTotal").textContent = ALL_SLOTS.length;
  updateScorePlaced();
}

function makeChip(answer, slotId) {
  const chip = document.createElement("div");
  chip.className = "chip";
  chip.draggable = true;

  const txt = document.createElement("span");
  txt.textContent = answer;

  const rm = document.createElement("span");
  rm.className = "chip-remove";
  rm.title = "Remove";
  rm.textContent = "✕";
  rm.addEventListener("click", e => {
    e.stopPropagation();
    delete placements[slotId];
    clearFeedback();
    rerender();
  });

  chip.appendChild(txt);
  chip.appendChild(rm);

  chip.addEventListener("dragstart", () => {
    dragPayload = { answer, fromSlot: slotId };
    chip.classList.add("dragging");
  });
  chip.addEventListener("dragend", () => chip.classList.remove("dragging"));

  return chip;
}

// ─────────────────────────────────────────
//  RENDER BANK
// ─────────────────────────────────────────
function renderBank() {
  const list   = document.getElementById("bankList");
  const filter = document.getElementById("bankSearch").value.toLowerCase();
  const inUse  = usedAnswers();

  list.innerHTML = "";
  let remaining = 0;

  _bankOrder.forEach(slot => {
    const answer = slot.answer;
    const isUsed = inUse.has(answer);
    if (!isUsed) remaining++;

    const el = document.createElement("div");
    el.className = "bank-token" + (isUsed ? " used" : "");
    if (filter && !answer.toLowerCase().includes(filter)) el.classList.add("hidden");
    el.textContent = answer;
    el.draggable = !isUsed;

    el.addEventListener("dragstart", () => {
      if (isUsed) return;
      dragPayload = { answer, fromSlot: null };
      el.classList.add("dragging");
    });
    el.addEventListener("dragend", () => el.classList.remove("dragging"));

    list.appendChild(el);
  });

  document.getElementById("bankCount").textContent = `${remaining} remaining`;
}

function updateScorePlaced() {
  document.getElementById("scorePlaced").textContent = Object.keys(placements).length;
}

// ─────────────────────────────────────────
//  FULL RERENDER
// ─────────────────────────────────────────
function rerender() {
  renderSections();
  renderBank();
}

// ─────────────────────────────────────────
//  CHECK
// ─────────────────────────────────────────
function clearFeedback() {
  document.querySelectorAll(".drop-zone").forEach(z => z.classList.remove("correct", "wrong"));
}

function checkAnswers() {
  let correct = 0;
  let filled  = 0;

  document.querySelectorAll(".drop-zone").forEach(zone => {
    const slotId = zone.dataset.slotId;
    const slot   = ALL_SLOTS.find(s => s.id === slotId);
    const placed = placements[slotId];
    if (!placed) return;
    filled++;
    const ok = placed === slot.answer;
    if (ok) correct++;
    zone.classList.remove("correct", "wrong");
    zone.classList.add(ok ? "correct" : "wrong");
  });

  document.getElementById("scoreCorrect").textContent = correct;
  document.getElementById("scorePct").textContent =
    filled ? Math.round(correct / ALL_SLOTS.length * 100) + "%" : "—";

  showToast(
    correct === ALL_SLOTS.length
      ? `🎉 Perfect! All ${correct} correct!`
      : `${correct} / ${ALL_SLOTS.length} correct (${filled} placed)`,
    correct === ALL_SLOTS.length ? "ok" : "err"
  );

  if (filled === ALL_SLOTS.length && correct === ALL_SLOTS.length) {
    setTimeout(() => {
      document.getElementById("overlayScore").textContent = `${correct} / ${ALL_SLOTS.length}`;
      document.getElementById("overlay").classList.add("active");
    }, 600);
  }
}

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show toast-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 2800);
}

// ─────────────────────────────────────────
//  BUTTONS
// ─────────────────────────────────────────
document.getElementById("checkBtn").addEventListener("click", checkAnswers);

document.getElementById("shuffleBtn").addEventListener("click", () => {
  _bankOrder = shuffleArr([...ALL_SLOTS]);
  renderBank();
  showToast("Bank shuffled!", "ok");
});

document.getElementById("resetBtn").addEventListener("click", () => {
  placements = {};
  _bankOrder  = shuffleArr([...ALL_SLOTS]);
  clearFeedback();
  document.getElementById("scoreCorrect").textContent = "0";
  document.getElementById("scorePlaced").textContent  = "0";
  document.getElementById("scorePct").textContent     = "—";
  rerender();
  showToast("Reset!", "err");
});

document.getElementById("bankSearch").addEventListener("input", renderBank);

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
_bankOrder = shuffleArr([...ALL_SLOTS]);
rerender();
</script>
